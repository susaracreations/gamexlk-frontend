<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#001529"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(168,85,247,0.08)" stroke-width="1">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Glow circles -->
  <circle cx="320" cy="180" r="120" fill="rgba(168,85,247,0.08)" filter="url(#blur)"/>
  <circle cx="320" cy="180" r="80" fill="rgba(6,182,212,0.05)" filter="url(#blur)"/>

  <!-- Hexagons decorative -->
  <polygon points="100,80 130,63 160,80 160,114 130,131 100,114" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>
  <polygon points="480,250 510,233 540,250 540,284 510,301 480,284" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="1.5"/>
  <polygon points="550,80 570,69 590,80 590,102 570,113 550,102" fill="none" stroke="rgba(236,72,153,0.2)" stroke-width="1"/>

  <!-- Controller icon body -->
  <g transform="translate(320,180)">
    <!-- Controller shadow/glow -->
    <ellipse cx="0" cy="0" rx="95" ry="55" fill="rgba(168,85,247,0.15)" filter="url(#blur)"/>

    <!-- Controller body -->
    <rect x="-80" y="-35" width="160" height="70" rx="35" fill="none" stroke="url(#glow)" stroke-width="2.5"/>
    <rect x="-80" y="-35" width="160" height="70" rx="35" fill="rgba(168,85,247,0.1)"/>

    <!-- Left grip -->
    <ellipse cx="-55" cy="30" rx="22" ry="28" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <ellipse cx="-55" cy="30" rx="22" ry="28" fill="rgba(168,85,247,0.08)"/>

    <!-- Right grip -->
    <ellipse cx="55" cy="30" rx="22" ry="28" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <ellipse cx="55" cy="30" rx="22" ry="28" fill="rgba(168,85,247,0.08)"/>

    <!-- D-pad left -->
    <rect x="-68" y="-8" width="30" height="10" rx="3" fill="rgba(6,182,212,0.6)"/>
    <rect x="-58" y="-18" width="10" height="30" rx="3" fill="rgba(6,182,212,0.6)"/>

    <!-- Buttons right -->
    <circle cx="48" cy="-10" r="7" fill="rgba(168,85,247,0.8)"/>
    <circle cx="64" cy="-10" r="7" fill="rgba(236,72,153,0.8)"/>
    <circle cx="56" cy="-22" r="7" fill="rgba(6,182,212,0.8)"/>
    <circle cx="56" cy="2" r="7" fill="rgba(34,197,94,0.8)"/>

    <!-- Center buttons -->
    <rect x="-12" y="-6" width="10" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="2" y="-6" width="10" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

    <!-- Analog sticks -->
    <circle cx="-30" cy="12" r="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="30" cy="12" r="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  </g>

  <!-- Brand text -->
  <text x="320" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#glow)">GAMEXLK STORE</text>
  <text x="320" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(148,163,184,0.6)">No Image Available</text>
</svg>
